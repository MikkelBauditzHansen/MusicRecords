<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Music Records</title>

    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<div id="app">

    <h1>Music Records</h1>

    <div v-if="!token" class="mb-4">
        <h3>Login</h3>
        <input v-model="auth.username" placeholder="Username" class="form-control mb-2">
        <input v-model="auth.password" type="password" placeholder="Password" class="form-control mb-2">
        <button class="btn btn-primary" @click="login">Login</button>
    </div>

    <div v-else>
        <div v-if="role === 'Admin'" class="alert alert-info">
            <h3>admin panel</h3>

            <input v-model="newMusic" placeholder="Title" class="form-control mb-2">
            <input v-model="newArtist" placeholder="Artist" class="form-control mb-2">
            <input v-model.number="newDuration" placeholder="Duration" class="form-control mb-2">
            <input v-model.number="newYear" placeholder="Year" class="form-control mb-2">

            <button class="btn btn-warning" @click="addMusic">Add Music</button>
        </div>

        <p>
            Logged in as <strong>{{ auth.username }}</strong> |
            Role: <strong>{{ role }}</strong>
        </p>

        <button class="btn btn-danger mb-3" @click="logout">
            Logout
        </button>

        <button class="btn btn-primary mb-3" @click="loadMusic">
            Load Music Records
        </button>

        <div class="mb-3">
            <input v-model="searchTitle" placeholder="Search title" class="form-control mb-2">
            <input v-model="searchArtist" placeholder="Search artist" class="form-control mb-2">

            <button class="btn btn-success me-2" @click="searchMusic">Search</button>
            <button class="btn btn-secondary" @click="clearSearch">Clear</button>
        </div>

        <table class="table table-striped" v-if="music.length > 0">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Artist</th>
                    <th>Duration</th>
                    <th>Year</th>
                </tr>
            </thead>
            <tbody>
                <tr v-for="record in music" :key="record.id">
                    <td>{{ record.title }}</td>
                    <td>{{ record.artist }}</td>
                    <td>{{ record.duration }}</td>
                    <td>{{ record.year }}</td>
                </tr>
            </tbody>
        </table>

        <p v-else>No music found</p>

        <div v-if="role === 'Admin'" class="alert alert-warning mt-3">
            You are Admin 👑
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
