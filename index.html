<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Records</title>

    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <div id="app">
        <h1 class="mb-4">Music Records</h1>

        <div v-if="!token" class="card p-4 mb-4">
            <h3>Login</h3>
            <input v-model="auth.username" type="text" placeholder="Username" class="form-control mb-2">
            <input v-model="auth.password" type="password" placeholder="Password" class="form-control mb-2">
            <button class="btn btn-primary" @click="login">Login</button>
        </div>

        <div v-else>
            <p>
                Logged in as <strong>{{ auth.username }}</strong> |
                Role: <strong>{{ role }}</strong>
            </p>

            <button class="btn btn-danger me-2 mb-3" @click="logout">Logout</button>
            <button class="btn btn-primary mb-3" @click="loadMusic">Load Music Records</button>

            <div class="card p-3 mb-4">
                <h3>Search Music</h3>
                <input v-model="searchTitle" type="text" placeholder="Search title" class="form-control mb-2">
                <input v-model="searchArtist" type="text" placeholder="Search artist" class="form-control mb-2">
                <button class="btn btn-success me-2" @click="searchMusic">Search</button>
                <button class="btn btn-secondary" @click="clearSearch">Clear</button>
            </div>

            <div v-if="role === 'Admin'" class="card p-3 mb-4">
                <h3>Add Music</h3>
                <input v-model="newMusic.title" type="text" placeholder="Title" class="form-control mb-2">
                <input v-model="newMusic.artist" type="text" placeholder="Artist" class="form-control mb-2">
                <input v-model.number="newMusic.duration" type="number" placeholder="Duration" class="form-control mb-2">
                <input v-model.number="newMusic.year" type="number" placeholder="Year" class="form-control mb-2">
                <button class="btn btn-warning" @click="addMusic">Add Music</button>
            </div>

            <div v-if="role === 'Admin' && editMusic.id !== null" class="card p-3 mb-4">
                <h3>Edit Music</h3>
                <input v-model="editMusic.title" type="text" placeholder="Title" class="form-control mb-2">
                <input v-model="editMusic.artist" type="text" placeholder="Artist" class="form-control mb-2">
                <input v-model.number="editMusic.duration" type="number" placeholder="Duration" class="form-control mb-2">
                <input v-model.number="editMusic.year" type="number" placeholder="Year" class="form-control mb-2">

                <button class="btn btn-primary me-2" @click="updateMusic">Save Changes</button>
                <button class="btn btn-secondary" @click="clearEdit">Cancel</button>
            </div>

            <table class="table table-striped" v-if="music.length > 0">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Artist</th>
                        <th>Duration</th>
                        <th>Year</th>
                        <th v-if="role === 'Admin'">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="record in music" :key="record.id">
                        <td>{{ record.title }}</td>
                        <td>{{ record.artist }}</td>
                        <td>{{ record.duration }}</td>
                        <td>{{ record.year }}</td>
                        <td v-if="role === 'Admin'">
                            <button class="btn btn-sm btn-primary me-2" @click="startEdit(record)">Edit</button>
                            <button class="btn btn-sm btn-danger" @click="deleteMusic(record.id)">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <p v-else>No music found</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
